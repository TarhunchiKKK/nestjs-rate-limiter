name: Testing

on:
  push:
    branches:
      - "dev"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Unit Tests
        run: bun run test:unit

      - name: E2e-Tests
        run: bun run test:e2e
